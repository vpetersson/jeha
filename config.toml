schema_version = 1

[mqtt]
host = "localhost"
port = 1883
base_topic = "zigbee2mqtt"

[general]
timezone = "Europe/London"

[circadian.defaults]
wake_time = "06:00"
sleep_time = "23:00"
start_temp_k = 2700
peak_temp_k = 4000
end_temp_k = 2200
start_brightness = 180
peak_brightness = 254
end_brightness = 150
ramp_duration_mins = 120
curve = "cosine"
transition_secs = 30
update_interval_secs = 60

[night_mode.defaults]
color_temp_k = 2200
brightness = 20
motion_timeout_secs = 120

[mcp]
bind = "127.0.0.1:8420"

# --- Rooms ---

[rooms.kitchen]
display_name = "Kitchen"
z2m_group = "Kitchen"
lights = ["0x001788010AAAAAAA"]
motion_sensor = "0x00158d000AAAAAAA"

[rooms.kitchen.circadian]
peak_temp_k = 5500
peak_brightness = 254

[rooms.kitchen.night_mode]
start_time = "22:30"
end_time = "06:30"

[rooms.office]
display_name = "Office"
z2m_group = "Office"

[rooms.bathroom]
display_name = "Bathroom"
z2m_group = "Bathroom Downstairs"
motion_sensor = "0x00158d000BBBBBBB"

[rooms.conrad_room]
display_name = "Conrad's Room"
z2m_group = "Conrads Room"

[rooms.conservatory]
display_name = "Conservatory"
z2m_group = "Conservatory"

[rooms.hallway_downstairs]
display_name = "Hallway Downstairs"
z2m_group = "Hallway Downstairs"
motion_sensor = "0x00158d000CCCCCCC"

[rooms.hallway_upstairs]
display_name = "Hallway Upstairs"
z2m_group = "Hallway Upstairs"
motion_sensor = "0x00158d000DDDDDDD"

[rooms.hermione_room]
display_name = "Hermione's Room"
z2m_group = "Hermiones Room"

[rooms.living_room]
display_name = "Living Room"
z2m_group = "Living Room"

[rooms.master_bedroom]
display_name = "Master Bedroom"
z2m_group = "Master Bedroom"

[rooms.night_lights]
display_name = "Night Lights"
z2m_group = "Night Lights"
[rooms.night_lights.circadian]
start_temp_k = 5000
end_temp_k = 2000

[rooms.porch]
display_name = "Porch"
z2m_group = "Porch"

# --- Automations ---

[[automations]]
id = "hallway_motion"
rooms = ["hallway_downstairs", "hallway_upstairs"]
[automations.trigger]
type = "motion"
[automations.action]
type = "lights_on"
use_circadian = true
[automations.off_action]
type = "lights_off"
delay_secs = 300

[[automations]]
id = "bathroom_motion"
rooms = ["bathroom"]
[automations.trigger]
type = "motion"
[automations.action]
type = "lights_on"
use_circadian = true
[automations.off_action]
type = "lights_off"
delay_secs = 180
