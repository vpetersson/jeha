name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-${{ hashFiles('Cargo.lock') }}
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ hashFiles('Cargo.lock') }}
      - run: cargo test --all

  build-docker:
    name: Build ${{ matrix.target }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [fmt, clippy, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
          - target: armv7-unknown-linux-musleabihf
          - target: arm-unknown-linux-musleabihf
    env:
      CROSS_VERSION: "0.2.5"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: build-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Install cross
        run: |
          curl -fsSL "https://github.com/cross-rs/cross/releases/download/v${CROSS_VERSION}/cross-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /usr/local/bin cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/jeha jeha-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jeha-${{ matrix.target }}
          path: jeha-${{ matrix.target }}

  docker:
    name: Docker (latest)
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries for Docker build
        run: |
          cp artifacts/jeha-x86_64-unknown-linux-musl/jeha-x86_64-unknown-linux-musl jeha-amd64
          cp artifacts/jeha-aarch64-unknown-linux-musl/jeha-aarch64-unknown-linux-musl jeha-arm64
          cp artifacts/jeha-armv7-unknown-linux-musleabihf/jeha-armv7-unknown-linux-musleabihf jeha-armv7
          cp artifacts/jeha-arm-unknown-linux-musleabihf/jeha-arm-unknown-linux-musleabihf jeha-armv6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          build-args: VERSION=latest
          push: true
          tags: vpetersson/jeha:latest
