name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      docker_tags: vpetersson/jeha:${{ github.ref_name }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PAT: ${{ secrets.DOCKER_PAT }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: jeha-*

      - name: Prepare release assets
        run: |
          mkdir release
          for dir in artifacts/jeha-*/; do
            cp "$dir"/* release/
          done
          cd release
          sha256sum jeha-* > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "${{ github.ref_name }}" release/* --generate-notes --repo "${{ github.repository }}"
          else
            gh release upload "${{ github.ref_name }}" release/* --clobber --repo "${{ github.repository }}"
          fi
