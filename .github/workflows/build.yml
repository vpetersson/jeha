name: Build

on:
  workflow_call:
    inputs:
      docker_tags:
        required: false
        type: string
        default: ''
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PAT:
        required: false

env:
  CARGO_TERM_COLOR: always
  CROSS_VERSION: "0.2.5"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
          - target: armv7-unknown-linux-musleabihf
          - target: arm-unknown-linux-musleabihf
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: build-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Install cross
        run: |
          curl -fsSL "https://github.com/cross-rs/cross/releases/download/v${CROSS_VERSION}/cross-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /usr/local/bin cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/jeha jeha-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jeha-${{ matrix.target }}
          path: jeha-${{ matrix.target }}

  docker:
    if: inputs.docker_tags != ''
    name: Docker
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries
        run: |
          cp artifacts/jeha-x86_64-unknown-linux-musl/jeha-x86_64-unknown-linux-musl jeha-amd64
          cp artifacts/jeha-aarch64-unknown-linux-musl/jeha-aarch64-unknown-linux-musl jeha-arm64
          cp artifacts/jeha-armv7-unknown-linux-musleabihf/jeha-armv7-unknown-linux-musleabihf jeha-armv7
          cp artifacts/jeha-arm-unknown-linux-musleabihf/jeha-arm-unknown-linux-musleabihf jeha-armv6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: ${{ inputs.docker_tags }}
