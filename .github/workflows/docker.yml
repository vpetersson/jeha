name: Docker

on:
  workflow_call:
    inputs:
      tags:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PAT:
        required: true

jobs:
  build:
    name: Docker (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            artifact: jeha-x86_64-unknown-linux-musl
            binary: amd64
          - platform: linux/arm64
            artifact: jeha-aarch64-unknown-linux-musl
            binary: arm64
          - platform: linux/arm/v7
            artifact: jeha-armv7-unknown-linux-musleabihf
            binary: armv7
          - platform: linux/arm/v6
            artifact: jeha-arm-unknown-linux-musleabihf
            binary: armv6
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}

      - name: Stage binary
        run: cp ${{ matrix.artifact }} jeha-${{ matrix.binary }}

      - name: Derive image name
        id: prep
        env:
          TAGS: ${{ inputs.tags }}
        run: echo "image=${TAGS%%:*}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: PREBUILT=1
          outputs: type=image,name=${{ steps.prep.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.binary }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          TAGS: ${{ inputs.tags }}
        run: |
          docker buildx imagetools create \
            --tag "$TAGS" \
            $(printf "${TAGS%%:*}@sha256:%s " *)
