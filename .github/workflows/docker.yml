name: Docker

on:
  workflow_call:
    inputs:
      tags:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PAT:
        required: true

jobs:
  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries for Docker build
        run: |
          cp artifacts/jeha-x86_64-unknown-linux-musl/jeha-x86_64-unknown-linux-musl jeha-amd64
          cp artifacts/jeha-aarch64-unknown-linux-musl/jeha-aarch64-unknown-linux-musl jeha-arm64
          cp artifacts/jeha-armv7-unknown-linux-musleabihf/jeha-armv7-unknown-linux-musleabihf jeha-armv7
          cp artifacts/jeha-arm-unknown-linux-musleabihf/jeha-arm-unknown-linux-musleabihf jeha-armv6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: ${{ inputs.tags }}
